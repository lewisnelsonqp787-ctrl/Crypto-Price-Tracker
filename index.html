





















<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crypto Price Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>💰 Crypto Price Tracker</h1>
      <input type="text" id="search" placeholder="Search coin..." />
    </header>

    <table id="cryptoTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Coin</th>
          <th>Price (USD)</th>
          <th>24h Change</th>
          <th>Market Cap</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <footer>
      <p>Data from <a href="https://www.coingecko.com/" target="_blank">CoinGecko</a> • Auto-refreshes every 60s</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
